name: namo_ganga_wms
description: Namo Ganga Workforce Management System - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.3

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^13.0.0

  # Location & Camera
  geolocator: ^11.0.0
  permission_handler: ^11.1.0
  camera: ^0.10.5+9
  image_picker: ^1.0.7

  # UI
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^3.0.0
  fl_chart: ^0.66.2
  intl: ^0.19.0
  timeago: ^3.6.0

  # Device
  device_info_plus: ^9.1.1
  package_info_plus: ^5.0.1

  # Utils
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2
  image_cropper: ^5.0.1
  path_provider: ^2.1.2
  dio_cache_interceptor: ^3.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  retrofit_generator: ^8.0.6
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
